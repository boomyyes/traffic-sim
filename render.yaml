# Render Blueprint - Indian Traffic Simulation Engine
# https://docs.render.com/blueprint-spec

services:
  - type: web
    name: indian-traffic-engine
    runtime: docker
    repo: https://github.com/boomyyes/traffic-sim
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        value: https://traffic-sim-nine.vercel.app/
