# ===========================================
# Indian Traffic Simulation Engine - Config
# ===========================================

# Simulation timing
sim.tick-rate-ms=100
sim.render-fps=60

# Road network defaults
sim.strip-width=0.5
sim.default-road-width=7.0
sim.default-speed-limit=40.0

# Agent settings
sim.max-vehicles=500
sim.spawn-rate-per-second=5

# IDM Physics parameters
sim.idm.desired-speed=22.22
sim.idm.max-acceleration=2.0
sim.idm.comfortable-deceleration=3.0
sim.idm.min-gap=2.0
sim.idm.time-headway=1.5
sim.idm.accel-exponent=4

# Seepage parameters
sim.seepage.safety-buffer=0.3
sim.seepage.min-speed-threshold=2.0

# Spring settings
spring.main.web-application-type=none
